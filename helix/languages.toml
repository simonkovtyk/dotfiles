[language-server.rust-analyzer]
command = "rust-analyzer"

[language-server.rust-analyzer.check]
command = "check"

[language-server.rust-analyzer.config]
procMacro.enable = true
checkOnSave = false
diagnostics.experimental.enable = false
cargo.features = "all"
cargo.buildScripts.enable = false

[[language]]
name = "rust"
file-types = ["rs"]
language-servers = ["rust-analyzer"]
roots = [
  "Cargo.toml",
  "Cargo.lock"
]

[language-server.eslint]
command = "vscode-eslint-language-server"
args = ["--stdio"]

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]

[language-server.typescript-language-server.config]
hostInfo = "helix"

[language-server.typescript-language-server.config.preferences]
quotePreference = "double"
jsxAttributeCompletionStyle = "none"

[language-server.angular-ls]
command = "ngserver"
args = [
  "--ngProbeLocations",
  "${$NODE_MODULES_GLOBAL}",
  "--tsProbeLocations",
  "${$NODE_MODULES_GLOBAL}",
  "--stdio",
  # If this for some reason doesn't work, try replacing ${NODE_MODULES_GLOBAL} with the absolute paths, e.g. output of `npm root -g`
]

[[language]]
name = "typescript"
file-types = ["ts", "tsx", "mts", "cts", "js", "jsx", "mjs", "cjs"]
language-servers = ["typescript-language-server"]

[language-server.css]
command = "vscode-css-language-server"
args = ["--stdio"]

[[language]]
name = "css"
file-types = ["css", "scss", "less", "sass"]
language-servers = ["css"]

[language-server.html]
command = "vscode-html-language-server"
args = ["--stdio"]

[language-server.tailwindcss]
command = "tailwindcss-language-server"
args = ["--stdio"]

[[language]]
name = "html"
file-types = ["html", "htm"]
language-servers = ["html", "tailwindcss", "angular-ls"]

[language-server.json]
command = "vscode-json-language-server"
args = ["--stdio"]

[[language]]
name = "json"
file-types = ["json", "jsonc", "json5"]
language-servers = ["json"]
